name: Linux Tests

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev

jobs:
  test:
    name: Swift ${{ matrix.swift }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Swift 6.2
          - swift: "6.2"
            os: ubuntu-24.04
          - swift: "6.2"
            os: ubuntu-22.04

          # Swift 6.1
          - swift: "6.1"
            os: ubuntu-24.04
          - swift: "6.1"
            os: ubuntu-22.04

          # Swift 6.0
          - swift: "6.0"
            os: ubuntu-24.04
          - swift: "6.0"
            os: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ matrix.swift }}

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
